name: Lights Out CI

on:
  push:
    branches: [ main, 'feat/**', 'fix/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

defaults:
  run:
    working-directory: electron

jobs:
  verify:
    name: Lint & Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Syntax check
        run: |
          node --check main.js
          node --check preload.js
          node --check renderer.js
          node --check settings.js
          node --check smartLights.js
          node --check profiles.js
          node --check calendar.js
          node --check lastLight.js

      - name: Smoke tests
        run: npm run smoke

  build:
    name: Package (Windows)
    needs: verify
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Regenerate icons
        run: npm run icons

      - name: Build portable + installer
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lights-out-windows
          path: |
            dist/LightsOut.exe
            dist/Lights Out Setup *.exe
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: lights-out-windows
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/LightsOut.exe
            dist/Lights Out Setup *.exe
          generate_release_notes: true
