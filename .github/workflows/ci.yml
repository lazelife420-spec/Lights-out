name: Lights Out CI

on:
  push:
    branches: [ main, 'feat/**', 'fix/**' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

defaults:
  run:
    working-directory: electron

jobs:
  verify:
    name: Lint & Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Syntax check
        # Check every shipped JS file so the gate can't drift out of sync with
        # the module list (scripts/ are dev tooling, excluded).
        run: |
          for f in *.js; do
            echo "node --check $f"
            node --check "$f"
          done

      - name: Unit tests
        run: npm test

      - name: Smoke tests
        run: npm run smoke

  build:
    name: Package (Windows)
    needs: verify
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Regenerate icons
        run: npm run icons

      - name: Build portable + installer
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lights-out-windows
          path: |
            dist/LightsOut.exe
            dist/Lights Out Setup *.exe
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: lights-out-windows
          path: dist

      - name: Generate SHA256 checksums
        working-directory: ${{ github.workspace }}/dist
        run: |
          sha256sum LightsOut.exe "Lights Out Setup "*.exe > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          make_latest: true
          files: |
            dist/LightsOut.exe
            dist/Lights Out Setup *.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true
