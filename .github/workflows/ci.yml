name: Lights Out CI

on:
  push:
    branches: [ main, 'feat/**', 'fix/**' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

defaults:
  run:
    working-directory: electron

jobs:
  verify:
    name: Lint, Test & Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # Auto-discovers every first-party JS file so the list can never drift as
      # new modules are added.
      - name: Syntax check
        run: |
          for f in *.js test/*.js scripts/*.js e2e/*.js; do
            echo "checking $f"
            node --check "$f"
          done

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Smoke tests
        run: npm run smoke

  e2e:
    name: Electron integration (Windows)
    needs: verify
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # Runs the real Electron app (dry-run only; no power action can fire) on
      # the actual target OS, so no xvfb/display shim is needed.
      - name: Electron integration tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            electron/playwright-report
            electron/test-results
          if-no-files-found: ignore

  build:
    name: Package (Windows)
    needs: verify
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Regenerate icons
        run: npm run icons

      - name: Build portable + installer
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lights-out-windows
          path: |
            dist/LightsOut.exe
            dist/Lights Out Setup *.exe
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: lights-out-windows
          path: dist

      - name: Generate SHA256 checksums
        working-directory: ${{ github.workspace }}/dist
        run: |
          sha256sum LightsOut.exe "Lights Out Setup "*.exe > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          make_latest: true
          files: |
            dist/LightsOut.exe
            dist/Lights Out Setup *.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true
