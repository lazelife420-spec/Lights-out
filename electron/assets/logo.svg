<?xml version="1.0" encoding="UTF-8"?>
<!-- Lights Out v2 Tray Icon (64x64): sharp geometric lamp head + bold broken power ring -->
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="f-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="g-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00FFD1"/>
      <stop offset="0.5" stop-color="#64FFF0"/>
      <stop offset="1" stop-color="#00BFA6"/>
    </linearGradient>
  </defs>

  <!-- Lamp shade: sharp, angular cone pointing down-right -->
  <polygon points="24,18 40,16 52,46 36,48" fill="#1c2028" stroke="#0f1218" stroke-width="1.5" stroke-linejoin="miter"/>
  <!-- Shade opening: sharp rim highlight -->
  <polygon points="36,48 52,46 50,48 38,50" fill="#303640"/>
  <!-- Inner shadow line -->
  <line x1="30" y1="20" x2="42" y2="44" stroke="#252a33" stroke-width="1.5"/>

  <!-- Bold broken power ring -->
  <g filter="url(#f-glow)">
    <!-- Broken circle with power-symbol opening (~10 o'clock) -->
    <circle cx="44" cy="36" r="12"
            fill="none" stroke="url(#g-ring)" stroke-width="4" stroke-linecap="butt"
            stroke-dasharray="22 8 24 6 19 5 6 34"
            stroke-dashoffset="10"/>
    <!-- Power notch: vertical bar inside the opening -->
    <line x1="32" y1="24" x2="32" y2="30"
          stroke="#00FFD1" stroke-width="4" stroke-linecap="butt"/>
  </g>

  <!-- Minimal flicker dots at gap edges -->
  <circle cx="33" cy="47" r="1.5" fill="#64FFF0" opacity="0.9"/>
  <circle cx="45" cy="48" r="1.3" fill="#64FFF0" opacity="0.7"/>
</svg>
