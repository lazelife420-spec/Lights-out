<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lights Out Widget</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .widget {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(13, 14, 17, 0.88);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(91, 140, 255, 0.25);
      border-radius: 10px;
      padding: 8px 14px;
      cursor: pointer;
      user-select: none;
    }
    .widget.phase-dim { border-color: rgba(212, 165, 10, 0.4); }
    .widget.phase-lastlight { border-color: rgba(255, 77, 77, 0.4); }
    .widget-ring {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(91, 140, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #5b8cff;
      flex-shrink: 0;
    }
    .widget.running .widget-ring {
      border-color: #4caf50;
      color: #4caf50;
      animation: pulse 2s ease infinite;
    }
    .widget.paused .widget-ring {
      border-color: #d4a50a;
      color: #d4a50a;
    }
    .widget.phase-dim .widget-ring {
      border-color: #d4a50a;
      color: #d4a50a;
    }
    .widget.phase-lastlight .widget-ring {
      border-color: #ff4d4d;
      color: #ff4d4d;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .widget-info {
      display: flex;
      flex-direction: column;
    }
    .widget-remaining {
      font-size: 15px;
      font-weight: 700;
      color: #e8ecf1;
      line-height: 1;
    }
    .widget-label {
      font-size: 8px;
      color: #6b7685;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 1px;
    }
    .widget-close {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: #6b7685;
      font-size: 14px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }
    .widget-close:hover { color: #ff4d4d; }
    .idle .widget-remaining { color: #6b7685; font-size: 11px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="widget idle" id="widget">
    <div class="widget-ring" id="widget-ring">&#x263E;</div>
    <div class="widget-info">
      <span class="widget-remaining" id="widget-remaining">Lights Out</span>
      <span class="widget-label" id="widget-label">idle</span>
    </div>
    <button class="widget-close" id="widget-close">&times;</button>
  </div>
  <script>
    const api = window.electronAPI || {};
    const widget = document.getElementById('widget');
    const ring = document.getElementById('widget-ring');
    const remaining = document.getElementById('widget-remaining');
    const label = document.getElementById('widget-label');
    const closeBtn = document.getElementById('widget-close');

    api.onWidgetUpdate?.((data) => {
      widget.className = 'widget';
      const running = data.running;
      const paused = data.paused;
      const phase = data.phase || 'idle';

      if (!running) {
        widget.classList.add('idle');
        remaining.textContent = 'Lights Out';
        label.textContent = 'idle';
        ring.innerHTML = '&#x263E;';
      } else {
        if (paused) {
          widget.classList.add('paused');
          label.textContent = 'PAUSED';
        } else {
          widget.classList.add('running');
          label.textContent = phase === 'dim' ? 'WINDING DOWN' : phase === 'lastlight' ? 'LAST LIGHT' : 'until bed';
        }
        if (phase && phase !== 'idle') widget.classList.add('phase-' + phase);
        remaining.textContent = data.remaining || '--:--';
        ring.innerHTML = '&#x1F534;';
      }
    });

    closeBtn.addEventListener('click', () => {
      api.closeWidget?.();
    });
  </script>
</body>
</html>
